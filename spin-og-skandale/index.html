<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin &amp; Skandale · Krisemanageren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14181c; --ink-2:#1b2127; --ink-3:#222a31;
    --paper:#f2eee3; --paper-2:#e7e1d2;
    --text:#1c1a17; --muted:#8a8f94; --muted-paper:#7a7464;
    --green:#6b9e78; --green-dk:#4d7a59;
    --red:#d13b2e; --red-dk:#a82d23;
    --gold:#c9a24b;
    --line:#2c353d; --line-paper:#d4cdbb;
    --shadow:0 24px 60px -18px rgba(0,0,0,.65);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 70% -10%, #1f272e 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #11181d 0%, transparent 55%),
      var(--ink);
    color:var(--paper);min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 16px 40px;-webkit-font-smoothing:antialiased;
  }
  .stage{width:100%;max-width:640px;display:flex;flex-direction:column;gap:14px}

  header.bar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:2px 4px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;line-height:1}
  .brand .logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;letter-spacing:.5px;text-transform:uppercase}
  .brand .logo .amp{color:var(--red);font-style:italic}
  .brand .tag{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
  .casecount{font-family:'Space Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:1px;white-space:nowrap}

  .record{display:flex;align-items:center;gap:10px;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .segs{display:flex;gap:5px;flex:1}
  .seg{flex:1;height:18px;border-radius:4px;background:#0d1115;display:grid;place-items:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#fff;line-height:1;transition:background .4s,box-shadow .2s}
  .seg.r{background:var(--green)} .seg.w{background:var(--red)}
  .seg.cur{box-shadow:0 0 0 2px var(--gold)}
  .rec-lbl{font-family:'Space Mono',monospace;font-size:11.5px;color:#aeb4ba;white-space:nowrap;letter-spacing:.5px}
  .rec-lbl b{color:var(--green)}

  .panel{position:relative}
  .card{background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg=="),linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);background-blend-mode:soft-light;color:var(--text);border-radius:6px;padding:26px 24px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden;border:1px solid var(--line-paper)}
  .card > *{position:relative;z-index:1}
  .card > .stamp{position:absolute;z-index:3}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:repeating-linear-gradient(90deg,var(--red) 0 22px,#b5b0a2 22px 30px);opacity:.85;z-index:2}
  .card::after{content:"FORTROLIGT";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(48px,15vw,80px);letter-spacing:8px;color:rgba(168,45,35,.06);white-space:nowrap;pointer-events:none;z-index:0}
  .stamp{position:absolute;top:16px;right:-4px;transform:rotate(-6deg);font-family:'Permanent Marker','Oswald',sans-serif;font-weight:400;font-size:16px;letter-spacing:1.2px;text-transform:uppercase;color:var(--red);padding:3px 12px;opacity:.85;border:none;background:transparent}
  .stamp::before{content:"";position:absolute;left:-3px;right:-5px;top:-2px;bottom:-1px;border:2.5px solid var(--red);border-radius:9px 4px 10px 5px;transform:rotate(1.4deg) skewX(-2deg);opacity:.85;pointer-events:none}
  .stamp::after{content:"";position:absolute;left:1px;right:-1px;top:1px;bottom:2px;border-top:2px solid var(--red);border-right:1.5px solid var(--red);border-radius:5px 9px 3px 7px;transform:rotate(-0.8deg);opacity:.45;pointer-events:none}
  .portrait{position:absolute;top:18px;left:18px;width:64px;height:64px;border-radius:50%;overflow:hidden;border:3px solid #fbf9f3;box-shadow:0 4px 12px rgba(0,0,0,.35),0 0 0 1px rgba(0,0,0,.25);background:#2c2823;z-index:2}
  .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.05) saturate(.9)}
  .card.has-portrait .meta,.card.has-portrait .case-title,.card.has-portrait .country,.card.has-portrait .cardsub{padding-left:78px}
  .stamp.land{animation:stampIn .55s cubic-bezier(.18,1.25,.3,1) both}
  @keyframes stampIn{0%{opacity:0;transform:rotate(7deg) scale(2.7)}55%{opacity:.85;transform:rotate(7deg) scale(.9)}75%{transform:rotate(7deg) scale(1.05)}100%{opacity:.78;transform:rotate(7deg) scale(1)}}
  .meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted-paper);letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px}
  .case-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,7vw,38px);line-height:1.02;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 12px;color:#16140f}
  .situation{font-size:15.5px;line-height:1.55;color:#2c2823}
  .question{font-size:16px;line-height:1.45;color:#2c2823;font-weight:500;margin:0 0 14px}
  .answer{margin:4px 0 0;padding:12px 14px;background:rgba(107,158,120,.14);border-left:3px solid var(--green);border-radius:4px;font-size:14.5px;line-height:1.5;color:#2a2620}
  .answer .alab{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--green-dk);display:block;margin-bottom:6px}
  .prompt{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#6b6457;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .prompt::after{content:"";flex:1;height:1px;background:var(--line-paper)}

  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{text-align:left;width:100%;cursor:pointer;background:#fbf9f3;border:1.5px solid var(--line-paper);border-radius:6px;padding:14px 16px;display:flex;gap:13px;align-items:flex-start;font-family:inherit;font-size:14.5px;line-height:1.45;color:#2a2620;transition:transform .12s ease,border-color .15s,background .15s,box-shadow .15s}
  .choice:hover{transform:translateY(-1px);border-color:#9c9482;background:#fff;box-shadow:0 6px 16px -10px rgba(0,0,0,.4)}
  .choice:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .choice .key{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;width:30px;height:30px;flex:none;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--paper)}

  .verdict{display:flex;align-items:center;gap:11px;font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(24px,7vw,30px);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .verdict .dot{width:15px;height:15px;border-radius:50%;flex:none}
  .verdict.good{color:var(--green-dk)} .verdict.good .dot{background:var(--green)}
  .verdict.bad{color:var(--red-dk)} .verdict.bad .dot{background:var(--red)}
  .vsub{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.5px;color:#6b6457;margin-bottom:14px}
  .consequence{font-size:15px;line-height:1.55;color:#2c2823}
  .truth{margin-top:16px;padding:13px 15px;background:rgba(209,59,46,.09);border-left:3px solid var(--red);border-radius:4px;font-size:13.5px;line-height:1.5;color:#4a443a}
  .truth .lab{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--red-dk);display:block;margin-bottom:7px}
  .country{display:inline-block;font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--paper);background:#2c2823;padding:4px 11px;border-radius:4px;margin:2px 0 9px}
  .cardsub{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted-paper);letter-spacing:.5px;margin:-4px 0 14px}
  .cover-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(34px,9vw,52px);line-height:.98;text-transform:uppercase;letter-spacing:.5px;color:#16140f;margin:6px 0 2px}
  .cover-title .amp{color:var(--red);font-style:italic}
  .cover-sub{font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(15px,4vw,19px);letter-spacing:5px;text-transform:uppercase;color:var(--muted-paper);margin-bottom:16px}
  .dossier{border-top:1px solid var(--line-paper);border-bottom:1px solid var(--line-paper);padding:12px 0;margin:0 0 16px;display:flex;flex-direction:column;gap:8px}
  .drow{display:flex;gap:12px;align-items:center;font-size:13.5px}
  .dk{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-paper);width:92px;flex:none}
  .dv{color:#2c2823}
  .redact{display:inline-block;height:15px;background:#1c1a17;border-radius:2px}
  .truth .tag{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.3px;padding:3px 9px;border-radius:20px;margin-bottom:8px}
  .truth .tag.right{background:rgba(107,158,120,.2);color:var(--green-dk)}
  .truth .tag.wrong{background:rgba(209,59,46,.16);color:var(--red-dk)}
  .truth .cmp{color:var(--muted-paper);font-weight:400}
  .qbox{margin-top:14px;padding:12px 15px;background:rgba(46,90,140,.10);border-left:3px solid #2e5a8c;border-radius:4px}
  .qbox .qlab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#264a73;margin-bottom:5px}
  .qbox .qt{font-size:14.5px;line-height:1.55;color:#3f3a31;font-style:italic}
  .qbox .qk{margin-top:7px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4px;color:var(--muted-paper)}
  .rekord{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.5px;margin:6px 0 0}
  .share-modal{position:fixed;inset:0;background:rgba(6,10,14,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
  .share-box{background:var(--paper);color:var(--paper-ink);border-radius:10px;padding:22px;max-width:340px;width:100%;box-shadow:0 20px 46px rgba(0,0,0,.5)}
  .share-box h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.5px;font-size:16px;margin:0 0 14px;color:#211d18}
  .share-list{display:flex;flex-direction:column;gap:8px}
  .share-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;color:#2c2823;cursor:pointer;text-align:left;text-decoration:none}
  .share-btn:hover{background:#f5efe0;border-color:rgba(0,0,0,.25)}
  .share-btn .ico{width:24px;height:24px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:5px;color:#fff;font-weight:700;font-size:12px}
  .share-btn .ico.fb{background:#1877f2}
  .share-btn .ico.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
  .share-btn .ico.x{background:#000}
  .share-btn .ico.ts{background:#5077c5}
  .share-btn .ico.tg{background:#229ed9}
  .share-btn .ico.sms{background:#34c759;font-size:10px;letter-spacing:.5px}
  .share-btn .ico.cp{background:var(--gold);color:#1a1710}
  .share-close{margin-top:14px;width:100%;padding:10px;background:transparent;border:1px solid rgba(0,0,0,.2);border-radius:5px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:12px;color:#4a443a;cursor:pointer}
  #music-btn{position:fixed;top:14px;right:14px;z-index:50;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:rgba(20,28,34,.85);color:#e7ecea;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
  #music-btn:hover{background:rgba(30,42,50,.95)}
  .sharegrid{font-size:20px;letter-spacing:3px;margin:14px 0 2px}

  .actions{margin-top:18px;display:flex;justify-content:flex-end}
  .btn{font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;border-radius:6px;padding:13px 24px;background:var(--ink);color:var(--paper);transition:transform .12s,box-shadow .15s,background .15s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(0,0,0,.6)}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .btn.go{background:var(--green-dk)} .btn.go:hover{background:var(--green)}
  .btn.big{font-size:18px;padding:16px 32px}

  .screen{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:34px 28px;box-shadow:var(--shadow)}
  .kicker{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .hero-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(34px,10vw,56px);line-height:.96;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .hero-title .amp{color:var(--red);font-style:italic}
  .hero-sub{font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(16px,4vw,20px);letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
  .lede{font-size:15.5px;line-height:1.6;color:#cfd4d8;max-width:54ch}
  .lede + .lede{margin-top:12px}
  .lede strong{color:var(--paper)}
  .phone{font-size:46px;line-height:1;margin-bottom:8px;animation:ring 1.6s ease-in-out infinite}
  @keyframes ring{0%,60%,100%{transform:rotate(0)}10%,30%,50%{transform:rotate(-12deg)}20%,40%{transform:rotate(12deg)}}

  .rank-badge{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,7vw,40px);text-transform:uppercase;letter-spacing:.5px;margin:6px 0 10px;line-height:1.05}
  .bigscore{font-family:'Oswald',sans-serif;font-weight:700;font-size:54px;line-height:1;margin:18px 0 2px}
  .scoreline{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);margin-top:4px}

  .art-banner{border-radius:10px;overflow:hidden;border:1px solid var(--line);margin:12px 0 2px;line-height:0;background:#0d141a}
  .art-banner svg{display:block;width:100%}
  .art-banner img{display:block;width:100%}
  .league{margin-top:24px;border-top:1px solid var(--line);padding-top:18px;text-align:left}
  .league h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--paper);margin-bottom:4px}
  .league .lsub{font-size:13px;color:#9aa0a6;margin-bottom:14px;line-height:1.45}
  .leg{display:flex;gap:12px;padding:11px 13px;border-radius:9px;background:var(--ink-3);margin-bottom:8px;border:1px solid transparent}
  .leg.me{border-color:var(--gold);background:rgba(201,162,75,.12)}
  .leg .rk{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;color:var(--gold);width:22px;flex:none;text-align:center;line-height:1.35}
  .leg .nm{font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;color:var(--paper);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .leg .nm .you{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;background:var(--gold);color:var(--ink);padding:2px 7px;border-radius:10px;text-transform:uppercase}
  .leg .ds{font-size:12.5px;line-height:1.45;color:#aab0b6;margin-top:3px}

  .fade{animation:fade .45s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .footer{text-align:center;font-family:'Space Mono',monospace;font-size:10.5px;color:#566069;letter-spacing:.5px;line-height:1.6;margin-top:4px}
  .footer span{color:var(--green)}

  @media (max-width:430px){
    .card{padding:24px 18px 20px}
    .screen{padding:26px 20px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>
  <button id="music-btn" onclick="toggleMusic()" title="Sluk musik">♫</button>
<div class="stage">

  <header class="bar">
    <div class="brand">
      <span class="logo">Spin <span class="amp">&amp;</span> Skandale</span>
      <span class="tag">Krisemanageren</span>
    </div>
    <span class="casecount" id="casecount"></span>
  </header>

  <div class="record" id="record" style="display:none">
    <div class="segs" id="segs"></div>
    <span class="rec-lbl" id="rec-lbl"><b>0</b> rigtige</span>
  </div>

  <div id="app"></div>

  <audio id="bgm-intro" src="intro.mp3" loop preload="auto"></audio>
  <audio id="bgm-ending" src="ending.mp3" preload="auto"></audio>
  <div class="footer">
    Satire · alle sager bygger på virkelige politiske skandaler<br>
    Spil og koncept · <span>Krisemanageren</span>
  </div>
</div>

<script>
const LEVELS = [
  { sag:"01", titel:"Watergate", based:"USA · Richard Nixon · 1972-74",
    situation:"Folk med forbindelse til præsidentens kampagne tages i et indbrud i oppositionens hovedkvarter. Sporene peger opad, og der findes lydbånd fra Det Ovale Kontor.",
    spm:"Hvad gjorde Nixon, da sporene begyndte at pege mod Det Hvide Hus?",
    svar:[
      {t:"Han forsøgte at dække over sagen og bremse FBI’s efterforskning, og holdt på lydbåndene til det sidste.", ok:true},
      {t:"Han gav et par medarbejdere skylden, hævdede intet kendskab og fortsatte, som om intet var hændt.", ok:false},
      {t:"Han udpegede straks en uvildig særanklager og udleverede alle lydbånd frivilligt.", ok:false}
    ],
    forklaring:"Mørklægningen, ikke selve indbruddet, blev hans fald. I næsten to år forsøgte Nixon at bremse efterforskningen, men de hemmelige lydbånd fra Det Ovale Kontor afslørede, at han havde været med til at dække over sagen næsten fra begyndelsen. Da Højesteret tvang ham til at udlevere båndene, og en rigsretssag rykkede tættere på, trådte han tilbage i 1974 som den eneste amerikanske præsident nogensinde. Hans efterfølger, Gerald Ford, benådede ham kort efter for samtlige forhold." },

  { sag:"02", titel:"Lewinsky-sagen", based:"USA · Bill Clinton · 1998",
    situation:"Det kommer frem, at præsidenten har haft et forhold til en ung praktikant i Det Hvide Hus. Han bliver afkrævet svar, også under ed.",
    spm:"Hvordan reagerede Bill Clinton, da forholdet kom frem?",
    svar:[
      {t:"Han benægtede det offentligt og under ed, indtil beviserne tvang en indrømmelse frem.", ok:true},
      {t:"Han erkendte forholdet med det samme i en tale og bad offentligheden om tilgivelse.", ok:false},
      {t:"Han afviste at svare på private spørgsmål og lod sine advokater tage alle henvendelser.", ok:false}
    ],
    forklaring:"Det var løgnen under ed, ikke selve affæren, der blev det alvorlige. Clinton afviste i månedsvis ethvert forhold, blandt andet med den berømte forsikring om, at han ikke havde haft seksuelle relationer til praktikanten, men de fysiske beviser efterlod til sidst ingen tvivl. Repræsentanternes Hus stillede ham for en rigsret for mened og forhindring af rettens arbejde. Senatet frikendte ham, og han sad præsidentperioden ud med usædvanligt høje popularitetstal." },

  { sag:"03", titel:"Svinebugten", based:"USA · John F. Kennedy · 1961",
    situation:"En hemmelig invasion, som den nye præsident godkendte, her slået fuldstændig fejl og er blevet en offentlig ydmygelse.",
    spm:"Hvad gjorde Kennedy, efter invasionen var slået fejl?",
    svar:[

const CITATER = {};

let currentLevel = 0;
let score = 0;
let userChoices = [];
let shuffledAnswers = [];
let musicPlaying = false;
let introAudio, endingAudio;

window.onload = function() {
  introAudio = document.getElementById('bgm-intro');
  endingAudio = document.getElementById('bgm-ending');
  showIntro();
};

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (!introAudio || !endingAudio) return;
  if (musicPlaying) {
    introAudio.pause();
    endingAudio.pause();
    btn.innerText = "♫";
    musicPlaying = false;
  } else {
    musicPlaying = true;
    btn.innerText = "⏸";
    if (currentLevel === -1) {
      endingAudio.play().catch(()=>{});
    } else {
      introAudio.play().catch(()=>{});
    }
  }
}

function render(html) {
  document.getElementById('app').innerHTML = html;
  // Denne funktion kører ved hver eneste skærmopdatering og scroller roligt siden i top:
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showIntro() {
  currentLevel = 0;
  score = 0;
  userChoices = [];
  document.getElementById('record').style.display = 'none';
  document.getElementById('casecount').innerText = "";
  
  if (musicPlaying && introAudio) {
    endingAudio.pause();
    introAudio.play().catch(()=>{});
  }

  const html = `
    <div class="screen fade">
      <div class="kicker">Interaktivt Satire-Spil</div>
      <h1 class="hero-title">Spin <span class="amp">&amp;</span> Skandale</h1>

  render(html);
}

function startGame() {
  currentLevel = 0;
  score = 0;
  userChoices = [];
  
  if (musicPlaying && introAudio) {
    endingAudio.pause();
    introAudio.play().catch(()=>{});
  }

  document.getElementById('record').style.display = 'flex';
  buildTracker();
  showQuestion();
}

function buildTracker() {
  const segs = document.getElementById('segs');
  segs.innerHTML = "";
  for (let i = 0; i < LEVELS.length; i++) {
    const d = document.createElement('div');
    d.className = 'seg';
    d.id = `seg-${i}`;
    d.innerText = LEVELS[i].sag;
    segs.appendChild(d);
  }
  updateTracker();
}

function updateTracker() {
  document.getElementById('rec-lbl').innerHTML = `<b>${score}</b> / ${LEVELS.length} rigtige`;
  for (let i = 0; i < LEVELS.length; i++) {
    const el = document.getElementById(`seg-${i}`);
    if (!el) continue;
    el.className = 'seg';
    if (i === currentLevel) el.classList.add('cur');
    if (userChoices[i] !== undefined) {
      if (userChoices[i].isCorrect) el.classList.add('r');
      else el.classList.add('w');
    }
  }
}

function showQuestion() {
  updateTracker();
  const lvl = LEVELS[currentLevel];
  document.getElementById('casecount').innerText = `SAG ${lvl.sag} / ${LEVELS.length}`;

  shuffledAnswers = lvl.svar.map((s, idx) => ({ ...s, originalIdx: idx }));
  shuffledAnswers.sort(() => Math.random() - 0.5);

  let choicesHtml = "";
  shuffledAnswers.forEach((ans, i) => {
    choicesHtml += `
      <button class="choice" onclick="selectAnswer(${i})">
        <span class="key">${SLOTS[i]}</span>
        <div class="txt">${ans.t}</div>
      </button>
    `;
  });

  const html = `
    <div class="panel fade">
      <div class="card">
        <div class="meta">${lvl.based}</div>
        <h2 class="case-title">${lvl.titel}</h2>
        <div class="situation">
          <p style="margin-bottom:14px;line-height:1.5">${lvl.situation}</p>
          <div class="prompt">Rådgivning efterspørges</div>
          <p class="question">${lvl.spm}</p>
        </div>
        <div class="choices">${choicesHtml}</div>
      </div>
    </div>
  `;
  render(html);
}

function selectAnswer(shuffledIdx) {
  const lvl = LEVELS[currentLevel];
  const chosen = shuffledAnswers[shuffledIdx];
  const isCorrect = chosen.ok;

  if (isCorrect) score++;
  userChoices.push({ shuffledIdx, isCorrect, chosenIdx: chosen.originalIdx });
  updateTracker();

  const verdictClass = isCorrect ? "good" : "bad";
  const verdictText = isCorrect ? "Ansvarsfuld håndtering" : "Spin-manøvre iværksat!";
  const subText = isCorrect ? "Du valgte den historiske virkelighed" : "Du valgte den kreative spin-bortforklaring";

  const nextBtnText = (currentLevel < LEVELS.length - 1) ? "Næste sag ▸" : "Se din endelige evaluering ▸";

  const html = `
    <div class="panel fade">
      <div class="card">
        <div class="stamp land" style="color:${isCorrect ? 'var(--green)' : 'var(--red)'};border-color:${isCorrect ? 'var(--green)' : 'var(--red)'}">
          ${isCorrect ? 'Virkelighed' : 'Spin'}
        </div>
        <div class="meta">${lvl.based} · SAG ${lvl.sag}</div>
        <h2 class="case-title">${lvl.titel}</h2>
        
        <div style="margin-bottom:18px">
          <div class="verdict ${verdictClass}">
            <div class="dot"></div> ${verdictText}
          </div>
          <div class="vsub">${subText}</div>
        </div>

        <div class="truth">
          <span class="lab">Hvad der reelt skete:</span>
          <p style="line-height:1.55">${lvl.forklaring}</p>
        </div>

        <div class="actions" style="margin-top:22px">
          <button class="btn go big" onclick="nextStep()">${nextBtnText}</button>
        </div>
      </div>
    </div>
  `;
  render(html);
}

function nextStep() {
  if (currentLevel < LEVELS.length - 1) {
    currentLevel++;
    showQuestion();
  } else {
    showEnding();
  }
}

function showEnding() {
  currentLevel = -1;
  document.getElementById('record').style.display = 'none';
  document.getElementById('casecount').innerText = "EVALUERING";

  if (musicPlaying && endingAudio) {
    introAudio.pause();
    endingAudio.play().catch(()=>{});
  }

  let rankIdx = 6; 
  if (score === 10) rankIdx = 0;
  else if (score === 9) rankIdx = 1;
  else if (score === i || score === 8) rankIdx = 2;
  else if (score === 7) rankIdx = 3;
  else if (score === 6) rankIdx = 4;
  else if (score === 5) rankIdx = 5;

  const rec = LEGENDS[rankIdx];

  let leagueRows = "";
  LEGENDS.forEach((l, idx) => {
    const isMe = idx === rankIdx;
    const reqScore = idx === 0 ? "10" : idx === 1 ? "9" : idx === 2 ? "8" : idx === 3 ? "7" : idx === 4 ? "6" : idx === 5 ? "5" : "<5";
    leagueRows += `
      <div class="leg ${isMe ? 'me' : ''}">
        <div class="rk">#${idx+1}</div>
        <div class="cont" style="flex:1">
          <div class="nm">${l.navn} ${isMe ? '<span class="you">DIG</span>' : ''} <span style="font-size:12px;color:var(--gold);font-weight:400;margin-left:auto">${reqScore} rigtige</span></div>
          <div class="ds">${l.flavor}</div>
        </div>
      </div>
    `;
  });

  const txt = `Du fangede sandheden i <strong>${score} ud af 10</strong> skandalesager. Dit niveau matcher herunder din plads i spindoktor-hierarkiet:`;

  const html = `
    <div class="screen fade" style="text-align:center">
      <div class="kicker">Resultat af krisestyring</div>
      <div class="bigscore" style="color:var(--gold)">${score} / 10</div>
      <div class="scoreline">Sager håndteret historisk korrekt</div>
      
      <h2 class="rank-badge" style="color:var(--gold);margin-top:24px">${rec.navn}</h2>
      <p class="lede" style="margin:0 auto 20px">${rec.desc}</p>
      
      <div class="league">
        <h3>Spindoktor-ligaen</h3>
        <div class="lsub">Jo bedre du kender virkeligheden bag strategierne, desto højere stiger du i ligaen.</div>
        ${leagueRows}
      </div>
      
      <div class="actions" style="justify-content:center;margin-top:24px;gap:12px">
        <button class="btn go big" onclick="startGame()">Prøv igen ▸</button>
        <button class="btn big" style="background:#2e5a8c;color:#fff" onclick="showIntro()">Hovedmenu ▸</button>
      </div>
    </div>
  `;
  render(html);
}
