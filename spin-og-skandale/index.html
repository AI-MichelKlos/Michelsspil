<style>

.panel{position:relative}.card{background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg=="),linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);background-blend-mode:soft-light;color:var(--text);border-radius:6px;padding:26px 24px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden;border:1px solid var(--line-paper)}.card>*{position:relative;z-index:1}.card>.stamp{position:absolute;z-index:3}.card::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:repeating-linear-gradient(90deg,var(--red) 0 22px,#b5b0a2 22px 30px);opacity:.85;z-index:2}.card::after{content:"FORTROLIGT";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(48px,15vw,80px);letter-spacing:8px;color:rgba(168,45,35,.06);white-space:nowrap;pointer-events:none;z-index:0}.stamp{position:absolute;top:18px;right:-6px;transform:rotate(7deg);font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--red);border:2.5px solid var(--red);border-radius:4px;padding:4px 10px;opacity:.78}.stamp.land{animation:stampIn .55s cubic-bezier(.18,1.25,.3,1) both}@keyframes stampIn{0%{opacity:0;transform:rotate(7deg) scale(2.7)}55%{opacity:.85;transform:rotate(7deg) scale(.9)}75%{transform:rotate(7deg) scale(1.05)}100%{opacity:.78;transform:rotate(7deg) scale(1)}}

.cover-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(34px,9vw,52px);line-height:.98;text-transform:uppercase;letter-spacing:.5px;color:#16140f;margin:6px 0 2px}.cover-title .amp{color:var(--red);font-style:italic}.cover-sub{font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(15px,4vw,19px);letter-spacing:5px;text-transform:uppercase;color:var(--muted-paper);margin-bottom:16px}.dossier{border-top:1px solid var(--line-paper);border-bottom:1px solid var(--line-paper);padding:12px 0;margin:0 0 16px;display:flex;flex-direction:column;gap:8px}.drow{display:flex;gap:12px;align-items:center;font-size:13.5px}.dk{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-paper);width:92px;flex:none}.dv{color:#2c2823}.redact{display:inline-block;height:15px;background:#1c1a17;border-radius:2px}
.qbox{margin-top:14px;padding:12px 15px;background:rgba(28,38,46,.05);border-left:3px solid var(--gold);border-radius:4px}.qbox .qlab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-paper);margin-bottom:5px}.qbox .qt{font-size:14.5px;line-height:1.55;color:#3f3a31;font-style:italic}.qbox .qk{margin-top:7px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4px;color:var(--muted-paper)}.actions{margin-top:18px;display:flex;justify-content:flex-end}.btn{font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;border-radius:6px;padding:13px 24px;background:var(--ink);color:var(--paper);transition:transform .12s,box-shadow .15s,background .15s}.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(0,0,0,.6)}.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}.btn.go{background:var(--green-dk)}.btn.go:hover{background:var(--green)}.btn.big{font-size:18px;padding:16px 32px}
.screen{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:34px 28px;box-shadow:var(--shadow)}.kicker{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}.lede{font-size:15.5px;line-height:1.6;color:#cfd4d8;max-width:54ch}.rank-badge{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,7vw,40px);text-transform:uppercase;letter-spacing:.5px;margin:6px 0 10px;line-height:1.05}.bigscore{font-family:'Oswald',sans-serif;font-weight:700;font-size:54px;line-height:1;margin:18px 0 2px}.scoreline{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);margin-top:4px}.rekord{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.5px;margin:6px 0 0}.sharegrid{font-size:20px;letter-spacing:3px;margin:14px 0 2px}.art-banner{border-radius:10px;overflow:hidden;border:1px solid var(--line);margin:12px 0 2px;line-height:0;background:#0d141a}.art-banner svg{display:block;width:100%}.league{margin-top:24px;border-top:1px solid var(--line);padding-top:18px;text-align:left}.league h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--paper);margin-bottom:4px}.league .lsub{font-size:13px;color:#9aa0a6;margin-bottom:14px;line-height:1.45}.leg{display:flex;gap:12px;padding:11px 13px;border-radius:9px;background:var(--ink-3);margin-bottom:8px;border:1px solid transparent}.leg.me{border-color:var(--gold);background:rgba(201,162,75,.12)}.leg .rk{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;color:var(--gold);width:22px;flex:none;text-align:center;line-height:1.35}.leg .nm{font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;color:var(--paper);display:flex;align-items:center;gap:8px;flex-wrap:wrap}.leg .nm .you{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;background:var(--gold);color:var(--ink);padding:2px 7px;border-radius:10px;text-transform:uppercase}.leg .ds{font-size:12.5px;line-height:1.45;color:#aab0b6;margin-top:3px}.fade{animation:fade .45s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.footer{text-align:center;font-family:'Space Mono',monospace;font-size:10.5px;color:#566069;letter-spacing:.5px;line-height:1.6;margin-top:4px}.footer span{color:var(--green)}@media(max-width:430px){.card{padding:24px 18px 20px}.screen{padding:26px 20px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

<div class="stage"><header class="bar"><div class="brand"><span class="logo">Spin <span class="amp">&amp;</span> Skandale</span><span class="tag">Krisemanageren</span></div><span class="casecount" id="casecount"></span></header><div class="record" id="record" style="display:none"><div class="segs" id="segs"></div><span class="rec-lbl" id="rec-lbl"><b>0</b> rigtige</span></div><div id="app"></div><div class="footer">Satire · alle sager bygger på virkelige politiske skandaler<br>Spil og koncept · <span>Krisemanageren</span></div></div>
<script>
const LEVELS=[
{sag:"01",titel:"Watergate",based:"USA · Richard Nixon · 1972-74",situation:"Folk med forbindelse til præsidentens kampagne tages i et indbrud i oppositionens hovedkvarter. Sporene peger opad, og der findes lydbånd fra Det Ovale Kontor.",spm:"Hvad gjorde Nixon, da sporene begyndte at pege mod Det Hvide Hus?",svar:[{t:"Han forsøgte at dække over sagen og bremse FBI’s efterforskning, og holdt på lydbåndene til det sidste.",ok:true},{t:"Han gav et par medarbejdere skylden, hævdede intet kendskab og fortsatte, som om intet var hændt.",ok:false},{t:"Han udpegede straks en uvildig særanklager og udleverede alle lydbånd frivilligt.",ok:false}],forklaring:"Mørklægningen, ikke selve indbruddet, blev hans fald. I næsten to år forsøgte Nixon at bremse efterforskningen, men de hemmelige lydbånd fra Det Ovale Kontor afslørede, at han havde været med til at dække over sagen næsten fra begyndelsen. Da Højesteret tvang ham til at udlevere båndene, og en rigsretssag rykkede tættere på, trådte han tilbage i 1974 som den eneste amerikanske præsident nogensinde. Hans efterfølger, Gerald Ford, benådede ham kort efter for samtlige forhold."},
{sag:"02",titel:"Lewinsky-sagen",based:"USA · Bill Clinton · 1998",situation:"Det kommer frem, at præsidenten har haft et forhold til en ung praktikant i Det Hvide Hus. Han bliver afkrævet svar, også under ed.",spm:"Hvordan reagerede Bill Clinton, da forholdet kom frem?",svar:[{t:"Han benægtede det offentligt og under ed, indtil beviserne tvang en indrømmelse frem.",ok:true},{t:"Han erkendte forholdet med det samme i en tale og bad offentligheden om tilgivelse.",ok:false},{t:"Han afviste at svare på private spørgsmål og lod sine advokater tage alle henvendelser.",ok:false}],forklaring:"Det var løgnen under ed, ikke selve affæren, der blev det alvorlige. Clinton afviste i månedsvis ethvert forhold, men de fysiske beviser efterlod til sidst ingen tvivl. Repræsentanternes Hus stillede ham for en rigsret for mened og forhindring af rettens arbejde. Senatet frikendte ham, og han sad præsidentperioden ud med usædvanligt høje popularitetstal."},
{sag:"03",titel:"Svinebugten",based:"USA · John F. Kennedy · 1961",situation:"En hemmelig invasion, som den nye præsident godkendte, er slået fuldstændig fejl og er blevet en offentlig ydmygelse.",spm:"Hvad gjorde Kennedy, efter invasionen var slået fejl?",svar:[{t:"Han tog det fulde ansvar offentligt, selvom CIA havde planlagt operationen.",ok:true},{t:"Han lagde ansvaret på CIA og militæret og lovede en grundig intern undersøgelse.",ok:false},{t:"Han nedtonede fiaskoen og afviste, at USA overhovedet havde stået bag.",ok:false}],forklaring:"I stedet for at skubbe skylden videre tog Kennedy det fulde, offentlige ansvar og slog fast, at sejre har mange fædre, mens nederlag er forældreløse. Paradoksalt nok steg hans popularitet bagefter, fordi vælgerne belønnede ærligheden. Internt mistede han tilliden til de rådgivere, der havde anbefalet operationen."},
{sag:"04",titel:"Profumo-sagen",based:"Storbritannien · John Profumo · 1963",situation:"Krigsministeren har haft en affære med en ung kvinde, der samtidig omgikkes en sovjetisk diplomat midt under den kolde krig.",spm:"Hvad gjorde Profumo, da affæren blev bragt op i Underhuset?",svar:[{t:"Han benægtede enhver upassende forbindelse direkte over for parlamentet.",ok:true},{t:"Han indrømmede affæren med det samme og bad Underhuset om tilgivelse.",ok:false},{t:"Han afviste at udtale sig af hensyn til rigets sikkerhed.",ok:false}],forklaring:"Løgnen over for parlamentet, ikke affæren i sig selv, blev afgørende. Da det kom frem, at Profumo havde talt usandt i Underhuset, måtte han træde tilbage få uger senere i dyb vanære. Sagen rystede Macmillan-regeringen, og de konservative mistede magten ved valget året efter."},
{sag:"05",titel:"Partygate",based:"Storbritannien · Boris Johnson · 2020-22",situation:"Mens landet er lukket ned under strenge corona-regler, har der været fester i regeringschefens egen embedsbolig.",spm:"Hvad gjorde Boris Johnson, da festerne kom frem?",svar:[{t:"Han afviste længe, at reglerne var brudt, og forsikrede parlamentet om det modsatte.",ok:true},{t:"Han erkendte straks fejlene, betalte bøde og undskyldte uforbeholdent i parlamentet.",ok:false},{t:"Han gav embedsværket skylden for at have arrangeret sammenkomsterne uden hans viden.",ok:false}],forklaring:"Benægtelserne holdt ikke. En intern undersøgelse og politiets bøderunde dokumenterede en stribe sammenkomster i strid med reglerne, og Johnson blev den første siddende britiske premierminister, der blev straffet for at have brudt loven. Et parlamentarisk udvalg konkluderede senere, at han bevidst havde vildledt Underhuset."},
{sag:"06",titel:"Cahuzac-sagen",based:"Frankrig · Jérôme Cahuzac · 2013",situation:"Budgetministeren, der står i spidsen for kampen mod skattesnyd, anklages for selv at have en hemmelig konto i udlandet.",spm:"Hvad gjorde Cahuzac, da anklagen kom frem?",svar:[{t:"Han benægtede blankt over for Nationalforsamlingen, at kontoen fandtes.",ok:true},{t:"Han indrømmede kontoen straks og trak sig samme dag, sagen blev kendt.",ok:false},{t:"Han kaldte det en politisk hetz og krævede en undersøgelse af sine anklagere.",ok:false}],forklaring:"Den kategoriske benægtelse gjorde faldet meget hårdere. Da det blev bevist, at budgetministeren med ansvar for skattekontrol selv havde skjult penge i udlandet, tilstod han, trådte tilbage og udløste en alvorlig tillidskrise for præsident Hollandes regering. Han blev senere idømt fængsel for skattesvig."},
{sag:"07",titel:"Wulff-sagen",based:"Tyskland · Christian Wulff · 2011-12",situation:"Forbundspræsidenten er ramt af en sag om et privat lån, og en stor avis er på vej med historien.",spm:"Hvad gjorde Wulff for at håndtere historien?",svar:[{t:"Han lagde en truende besked på chefredaktørens telefonsvarer for at få historien stoppet.",ok:true},{t:"Han indkaldte til pressemøde og svarede åbent på alle spørgsmål om lånet.",ok:false},{t:"Han lod sin advokat sende en høflig anmodning om at udskyde offentliggørelsen.",ok:false}],forklaring:"Det var ikke lånet, men forsøget på at kvæle pressehistorien, der blev sagen. Beskeden til chefredaktøren blev opfattet som et angreb på pressefriheden fra landets statsoverhoved og udløste et ramaskrig. Wulff trådte tilbage som forbundspræsident efter under to år i embedet."},
{sag:"08",titel:"Guttenberg-sagen",based:"Tyskland · Karl-Theodor zu Guttenberg · 2011",situation:"Den populære forsvarsminister beskyldes for at have afskrevet store dele af sin doktorafhandling.",spm:"Hvad gjorde Guttenberg, da dokumentationen voksede?",svar:[{t:"Han kaldte først anklagerne absurde, men trak sig, da presset blev for stort.",ok:true},{t:"Han erkendte straks plagiering og bad universitetet fratage ham titlen.",ok:false},{t:"Han hævdede, at en research-assistent havde begået fejlene uden hans viden.",ok:false}],forklaring:"Han kaldte først anklagerne absurde, men dokumentationen for de afskrevne passager voksede dag for dag. Universitetet i Bayreuth fratog ham doktortitlen, og presset blev for stort. Den ellers stærkt populære minister trådte tilbage og forlod tysk politik."},
{sag:"09",titel:"Rob Ford-sagen",based:"Canada · Rob Ford, Toronto · 2013",situation:"Der spredes rygter om en video, hvor byens borgmester ryger crack. Han bliver spurgt igen og igen, om den findes.",spm:"Hvad gjorde Rob Ford, mens rygterne om videoen voksede?",svar:[{t:"Han benægtede gentagne gange, at videoen overhovedet fandtes.",ok:true},{t:"Han erkendte et misbrug, gik i behandling og trak sig midlertidigt fra posten.",ok:false},{t:"Han indrømmede et enkeltstående fejltrin og lovede fuld åbenhed om sit helbred.",ok:false}],forklaring:"Benægtelserne hobede sig op, indtil politiet oplyste, at de var i besiddelse af videoen. Først da indrømmede Ford, at han havde røget crack. Han nægtede at gå af, så byrådet fratog ham størstedelen af borgmesterens beføjelser."},

const SLOTS=["A","B","C"];
const LEGENDS=[{navn:"Grigorij Rasputin",pron:"han",flavor:"den sibiriske mystiker, der hviskede tsarer i øret og styrede udnævnelser fra kulissen",desc:"Sibirisk mystiker, der fik hypnotisk indflydelse på den russiske tsarfamilie i starten af 1900-tallet."},{navn:"Steve Bannon",pron:"han",flavor:"kaos-ingeniøren bag Trumps 2016-sejr",desc:"Højrepopulistisk strateg, der brugte aggressiv kulturkamp, internet-memes og bevidst kaos."},{navn:"Alastair Campbell",pron:"han",flavor:"Blairs frygtede pressechef, manden bag selve ordet spin",desc:"Tony Blairs pressechef, kendt for aggressiv mediehåndtering og et jerngreb om pressen."},{navn:"Dominic Cummings",pron:"han",flavor:"Brexit-hjernen med foragt for embedsværket",desc:"Systemkritisk kampagnestrateg bag Brexit og senere toprådgiver for Boris Johnson."},{navn:"Karl Rove",pron:"han",flavor:"Bush's Brain, datadrevet og nådesløs",desc:"Strategen bag George W. Bush, kendt for langsigtede og aggressive valgkampagner."},{navn:"Judy Smith",pron:"hun",flavor:"Washingtons mester i at begrave skandaler, forbilledet for tv-serien Scandal",desc:"USA's mest kendte krise-PR-ekspert og inspirationen til tv-serien Scandal."},{navn:"Martin Rossen",pron:"han",flavor:"Mette Frederiksens tidligere stabschef",desc:"Tidligere stabschef med hidtil uset formel magt i regeringens topudvalg."}];
const CITATER={"01":{t:"Magt korrumperer, og absolut magt korrumperer absolut.",k:"Lord Acton"},"02":{t:"Taler du sandt, behøver du ikke huske på noget.",k:"Mark Twain"},"03":{t:"Storhedens pris er ansvar.",k:"Winston Churchill"},"04":{t:"Alle ser, hvad du synes at være; få mærker, hvad du i virkeligheden er.",k:"Niccolò Machiavelli"},"05":{t:"Alle dyr er lige, men nogle dyr er mere lige end andre.",k:"George Orwell"},"06":{t:"Hykleri er den hyldest, lasten yder dyden.",k:"François de La Rochefoucauld"},"07":{t:"Vores frihed afhænger af pressefriheden.",k:"Thomas Jefferson"},"08":{t:"Umodne digtere efterligner; modne digtere stjæler.",k:"T.S. Eliot"},"09":{t:"Intet er lettere end selvbedrag.",k:"Demosthenes"},"10":{t:"Jo mere fordærvet en stat er, jo flere love har den.",k:"Tacitus"}};
let state={i:0,history:[],rigtige:0,slots:{},started:false};const app=document.getElementById('app'),recordEl=document.getElementById('record'),segsEl=document.getElementById('segs'),recLbl=document.getElementById('rec-lbl'),caseCount=document.getElementById('casecount'),introAudio=document.getElementById('introAudio'),endingAudio=document.getElementById('endingAudio');segsEl.innerHTML=LEVELS.map((_,i)=>`<span class="seg" id="seg-${i}"></span>`).join('');
function tryPlay(a){try{a.currentTime=0;a.volume=.28;const p=a.play();if(p&&p.catch)p.catch(()=>{});}catch(e){}}
function renderRecord(){LEVELS.forEach((_,i)=>{const seg=document.getElementById('seg-'+i);seg.className='seg'+(state.history[i]===true?' r':state.history[i]===false?' w':'');seg.textContent=state.history[i]===true?'✓':state.history[i]===false?'✗':'';if(i===state.i&&state.history[i]===undefined)seg.classList.add('cur')});recLbl.innerHTML=`<b>${state.rigtige}</b> rigtige`}
function intro(){recordEl.style.display='none';caseCount.textContent='';app.innerHTML=`<div class="panel fade"><div class="card"><div class="stamp land">Klassificeret</div><div class="meta">Sagsmappe // kun til dine øjne</div><h1 class="cover-title">Spin <span class="amp">&amp;</span> Skandale</h1><div class="cover-sub">Krisemanageren</div><div class="dossier"><div class="drow"><span class="dk">Klient</span><span class="redact" style="width:150px"></span></div><div class="drow"><span class="dk">Din status</span><span class="dv">Praktikant uden referencer</span></div><div class="drow"><span class="dk">Opgave</span><span class="dv">10 sager. Kend sandheden.</span></div></div><p class="situation">Du er fuldstændig ny i branchen, en grøn praktikant i krisekommunikationens skyggeverden. Inden spindoktor-ligaen vil bruge dig, sætter de dig på prøve: kender du overhovedet din krisehistorie?</p><p class="situation" style="margin-top:12px">Ti berømte skandaler. For hver skal du svare på, hvad der rent faktisk skete. Tre svarmuligheder, alle plausible, men kun ét er sandt.</p><button class="btn go big" id="start" style="margin-top:18px">📞 Tag telefonen ▸</button></div></div>`;document.getElementById('start').onclick=startGame}
function startGame(){tryPlay(introAudio);state={i:0,history:[],rigtige:0,slots:{},started:true,deck:shuffle([...Array(LEVELS.length).keys()])};recordEl.style.display='flex';renderRecord();showCase()}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function parseBased(b){const p=b.split('·').map(s=>s.trim());return{land:p[0]||'',person:p[1]||'',aar:p[p.length-1]||''}}
function showCase(){const lv=LEVELS[state.deck[state.i]],b=parseBased(lv.based),nr=String(state.i+1).padStart(2,'0'),ord=shuffle([0,1,2]);state.slots=ord;caseCount.textContent='SAG '+(state.i+1)+' / 10';renderRecord();const buttons=ord.map((optIdx,slot)=>`<button class="choice" data-slot="${slot}"><span class="key">${SLOTS[slot]}</span><span>${lv.svar[optIdx].t}</span></button>`).join('');app.innerHTML=`<div class="panel fade"><div class="card"><div class="stamp">Aktiv sag</div><div class="meta">Sag nr. ${nr}</div><div class="country">${b.land}</div><h2 class="case-title">${lv.titel}</h2><div class="cardsub">${b.person} · ${b.aar}</div><p class="situation">${lv.situation}</p><div class="prompt">Spørgsmål</div><p class="question">${lv.spm}</p><div class="choices">${buttons}</div></div></div>`;app.querySelectorAll('.choice').forEach(b=>{b.onclick=()=>choose(parseInt(b.dataset.slot,10))})}
function choose(slot){const lv=LEVELS[state.deck[state.i]],b=parseBased(lv.based),nr=String(state.i+1).padStart(2,'0'),picked=lv.svar[state.slots[slot]],good=!!picked.ok,correct=lv.svar.find(o=>o.ok),q=CITATER[lv.sag];state.history[state.i]=good;if(good)state.rigtige++;renderRecord();app.innerHTML=`<div class="panel fade"><div class="card"><div class="stamp land" style="${good?'color:var(--green);border-color:var(--green)':''}">${good?'Rigtigt':'Forkert'}</div><div class="meta">Sag nr. ${nr} · dit svar</div><div class="country">${b.land}</div><h2 class="case-title">${lv.titel}</h2><div class="verdict ${good?'good':'bad'}"><span class="dot"></span>${good?'Rigtigt svar':'Forkert svar'}</div>${good?'':`<div class="vsub">Du svarede: ${picked.t}</div>`}<div class="answer"><span class="alab">Det rigtige svar</span>${correct.t}</div><div class="truth"><span class="lab">Ekstra viden · sådan gik det i virkeligheden · ${b.aar}</span>${lv.forklaring}</div><div class="qbox"><div class="qlab">Til eftertanke</div><div class="qt">${q.t}</div><div class="qk">${q.k}</div></div><div class="actions" id="act"></div></div></div>`;const act=document.getElementById('act');if(state.i===LEVELS.length-1){act.innerHTML=`<button class="btn go big" id="next">Se dit jobtilbud ▸</button>`;document.getElementById('next').onclick=ending}else{act.innerHTML=`<button class="btn big" id="next">Næste sag ▸</button>`;document.getElementById('next').onclick=()=>{state.i++;showCase()}}}
const OIL_ART=`<svg viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="300" fill="#11202a"/><rect y="0" width="680" height="190" fill="#14212a"/><path d="M0 70 C160 35 280 90 440 60 C560 40 625 80 680 60" fill="none" stroke="#6b9e78" stroke-width="18" opacity=".18"/><circle cx="95" cy="58" r="23" fill="#edf2ef"/><rect y="195" width="680" height="105" fill="#0f1b22"/><ellipse cx="510" cy="250" rx="110" ry="17" fill="#070b0f"/><path d="M450 205 L500 70 L550 205 M500 70 L610 80" stroke="#65747c" stroke-width="5" fill="none"/><rect x="430" y="190" width="170" height="15" fill="#4c5b63"/><path d="M610 82 C610 60 625 55 618 35 C635 55 625 73 625 84 Z" fill="#d13b2e"/><path d="M45 255 C95 230 160 240 205 255 L195 275 C125 286 60 278 25 267 Z" fill="#d9e4e8"/><text x="32" y="228" font-size="34">🐻‍❄️ 🐻‍❄️ 🐻‍❄️</text></svg>`;
const MAAGE_ART=`<svg viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="300" fill="#dfe8ef"/><rect y="185" width="680" height="115" fill="#25323a"/><text x="34" y="70" font-size="48">🕊️ Ж</text><text x="210" y="120" font-size="54">🕊️ Д</text><text x="420" y="82" font-size="48">🕊️ Я</text><text x="520" y="150" font-size="54">🕊️ Б</text><text x="65" y="232" font-size="42">👔🎨</text><text x="150" y="232" font-family="Oswald, Arial" font-size="22" fill="#111">Fiktiv specialopgave</text></svg>`;
function ending(){tryPlay(endingAudio);const r=state.rigtige,recIdx=(r>=5)?(10-r):6,rec=LEGENDS[recIdx],grid=state.history.map(h=>h?'🟩':'🟥').join('');let rekord=0;try{rekord=parseInt(localStorage.getItem('spin_rekord')||'0',10)||0}catch(e){}const nyRekord=r>rekord;if(nyRekord){rekord=r;try{localStorage.setItem('spin_rekord',String(r))}catch(e){}}const farve=(r>=5)?'var(--green)':'var(--red)',border=(r>=5)?'var(--green-dk)':'var(--red-dk)';let txt;if(r>=5){const S=rec.pron==='hun'?'Hun':'Han',s=rec.pron==='hun'?'hun':'han';txt=`Din telefon ringer. Det er <b>${rec.navn}</b>, ${rec.flavor}. ${S} har fulgt din håndtering af alle ti sager og er imponeret: ${r} ud af 10 reddet. Nu vil ${s} have dig på en opgave. En virksomhed skal have den grønlandske regering til at åbne et ellers fredet område, så der kan suges olie op. Lønnen er astronomisk. Samvittigheden er valgfri.`}else{txt=`Din telefon ringer, men det er ikke en af de helt store legender. Det er <b>Martin Rossen</b>. Du imponerede ikke ligaen denne gang: ${r} ud af 10 rakte ikke til de internationale stjerner. Til gengæld har han en opgave, der ikke kræver finesse: fang en flok måger, mal dem grå, og skriv russiske bogstaver på vingerne.`}const banner='<div class="art-banner">'+(r>=5?OIL_ART:MAAGE_ART)+'</div>';const leagueRows=LEGENDS.map((L,i)=>`<div class="leg${i===recIdx?' me':''}"><div class="rk">${i+1}</div><div><div class="nm">${L.navn}${i===recIdx?'<span class="you">Ringede til dig</span>':''}</div><div class="ds">${L.desc}</div></div></div>`).join('');caseCount.textContent='AUDITION SLUT';app.innerHTML=`<div class="screen fade" style="border-color:${border}"><div class="kicker" style="color:${farve}">Ligaen har set dig</div><div class="bigscore" style="color:${farve}">${r} / 10</div><div class="scoreline">sager reddet</div><div class="sharegrid">${grid}</div><div class="rekord" style="color:${nyRekord?'var(--gold)':'var(--muted-paper)'}">${nyRekord?'Ny rekord! ':''}Din bedste hidtil: ${rekord} / 10</div><h2 class="rank-badge" style="color:${farve};margin-top:18px">${rec.navn} ringer</h2><p class="lede">${txt}</p>${banner}<div class="league"><h3>Spindoktor-ligaen</h3><div class="lsub">Jo flere sager du redder, jo højere i ligaen rækker du.</div>${leagueRows}</div><div class="actions" style="justify-content:flex-start;margin-top:22px;flex-wrap:wrap;gap:10px"><button class="btn go big" id="again">${r>=5?'Tag en ny runde':'Se om du kan få det gode tilbud'} ▸</button><button class="btn big" id="share">Del resultat ▸</button></div></div>`;document.getElementById('again').onclick=startGame;const shareBtn=document.getElementById('share');shareBtn.onclick=()=>{const text='Spin & Skandale: Krisemanageren\n'+r+'/10, rekrutteret af '+rec.navn+'\n'+grid+'\nKan du slå mig?';if(navigator.share){navigator.share({title:'Spin & Skandale',text:text,url:location.href}).catch(()=>{})}else if(navigator.clipboard){navigator.clipboard.writeText(text+'\n'+location.href).then(()=>{shareBtn.textContent='Kopieret ✓';setTimeout(()=>{shareBtn.textContent='Del resultat ▸'},2000)}).catch(()=>{})}}}
document.addEventListener('keydown',e=>{if(!state.started)return;const idx=SLOTS.indexOf(e.key.toUpperCase());if(idx>=0){const btn=app.querySelector('.choice[data-slot="'+idx+'"]');if(btn)btn.click()}});intro();
</script>
