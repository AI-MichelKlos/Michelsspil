<script>
/* =========================================================
   LYDEFFEKTER — Web Audio API, ingen eksterne filer
   ========================================================= */
const SFX = (function(){
  let ctx;
  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function correct(){
    /* Kort, snappy kamera-klik */
    const c = getCtx();
    const t = c.currentTime;
    /* Klik: kort hvid støj burst */
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.035), c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      const env = 1 - (i / data.length);
      data[i] = (Math.random() * 2 - 1) * env * env;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    /* Båndpas for at gøre det mere mekanisk */
    const bp = c.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 3200; bp.Q.value = 1.8;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    src.connect(bp); bp.connect(gain); gain.connect(c.destination);
    src.start(t); src.stop(t + 0.06);

    /* Lille "pling" ovenpå */
    const osc = c.createOscillator();
    osc.type = 'sine'; osc.frequency.value = 1400;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0.12, t + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(g2); g2.connect(c.destination);
    osc.start(t + 0.02); osc.stop(t + 0.12);
  }

  function wrong(){
    /* Dump bonk-lyd */
    const c = getCtx();
    const t = c.currentTime;
    const osc = c.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.18);
    const g = c.createGain();
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + 0.22);

    /* Kort støj-lag for tekstur */
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.05), c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i/data.length) * 0.6;
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const lp = c.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0.18, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    src.connect(lp); lp.connect(g2); g2.connect(c.destination);
    src.start(t); src.stop(t + 0.08);
  }

  function rekord(){
    /* Cha-ching: stigende tretonet fanfare */
    const c = getCtx();
    const t = c.currentTime;
    const notes = [523, 659, 784]; /* C5, E5, G5 */
    notes.forEach(function(freq, i){
      const osc = c.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = c.createGain();
      const start = t + i * 0.1;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.22, start + 0.02);
      g.gain.setValueAtTime(0.22, start + 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
      osc.connect(g); g.connect(c.destination);
      osc.start(start); osc.stop(start + 0.35);
    });
    /* Lille shimmer ovenpå */
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.08), c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const hp = c.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 6000;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0.08, t + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(hp); hp.connect(g2); g2.connect(c.destination);
    src.start(t + 0.05); src.stop(t + 0.3);
  }

  return { correct:correct, wrong:wrong, rekord:rekord };
})();

/* Skærm-ryst */
function screenShake(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const el = document.getElementById('stage');
  el.classList.remove('shake');
  void el.offsetWidth; /* force reflow */
  el.classList.add('shake');
  el.addEventListener('animationend', function(){ el.classList.remove('shake'); }, {once:true});
}

/* ---------------------------------------------------------
   SPILLOGIK
--------------------------------------------------------- */
